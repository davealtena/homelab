---
# CDI-based NVIDIA runtime. k3s auto-generates the `nvidia` (legacy) +
# `nvidia-experimental` RuntimeClasses, but the legacy nvidia-container-runtime
# needs nvidia-container-cli which isn't wired up on NixOS. The `nvidia-cdi`
# containerd runtime (nvidia-container-runtime.cdi) injects via the CDI spec
# generated by hardware.nvidia-container-toolkit, which is what works here.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia-cdi
handler: nvidia-cdi
