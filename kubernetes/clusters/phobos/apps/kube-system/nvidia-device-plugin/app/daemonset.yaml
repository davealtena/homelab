---
# NVIDIA k8s device plugin — advertises nvidia.com/gpu so pods can schedule the
# RTX 5060 Ti. Runs under the CDI runtime (runtimeClassName: nvidia-cdi) so the
# driver is injected into the plugin pod. DEVICE_ID_STRATEGY=index makes the
# advertised device match the host CDI spec's device names (nvidia.com/gpu=0),
# otherwise CDI injection fails with "unresolvable CDI devices ...=GPU-<uuid>".
#
# GPU workloads request it with:
#   runtimeClassName: nvidia-cdi
#   resources: { limits: { nvidia.com/gpu: 1 } }
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
  labels:
    app: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
    spec:
      runtimeClassName: nvidia-cdi
      priorityClassName: system-node-critical
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.19.3
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: DEVICE_ID_STRATEGY
              value: index
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
