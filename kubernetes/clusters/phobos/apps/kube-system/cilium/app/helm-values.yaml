---
# Values for the phobos (society) Cilium install. These MUST match the values
# of the imperatively-bootstrapped release so Flux adopts it without a
# disruptive rollout. Cilium is bootstrapped by hand before Flux exists (CNI is
# a prerequisite for Flux) and then adopted here for ongoing GitOps management.
cluster:
  id: 1
  name: society
cni:
  exclusive: false
endpointRoutes:
  enabled: true
gatewayAPI:
  enabled: true
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
ipam:
  mode: kubernetes
ipv4NativeRoutingCIDR: 10.42.0.0/16
# L2 announcements advertise LoadBalancer/externalIP ARP on the LAN (envoy
# gateways .130/.131 etc). Raise the k8s client rate limit as recommended when
# L2 announcements are enabled (each announcement uses a lease).
k8sClientRateLimit:
  qps: 50
  burst: 100
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443
kubeProxyReplacement: true
l2announcements:
  enabled: true
l7Proxy: true
loadBalancer:
  algorithm: maglev
operator:
  replicas: 1
  rollOutPods: true
rollOutCiliumPods: true
routingMode: native
