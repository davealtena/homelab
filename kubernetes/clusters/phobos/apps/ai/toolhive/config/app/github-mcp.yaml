---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: github-mcp
spec:
  image: ghcr.io/github/github-mcp-server
  transport: stdio
  proxyMode: streamable-http
  proxyPort: 8080
  env:
    - name: GITHUB_API_URL
      value: https://api.github.com
    - name: LOG_LEVEL
      value: info
  secrets:
    - name: toolhive-github
      key: GITHUB_PERSONAL_ACCESS_TOKEN
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  groupRef:
    name: mcp-tools
