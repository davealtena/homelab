---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  values:
    fullnameOverride: victoria-logs-collector
    podMonitor:
      enabled: true
    remoteWrite:
      - url: http://victoria-logs.observability.svc.cluster.local:9428
