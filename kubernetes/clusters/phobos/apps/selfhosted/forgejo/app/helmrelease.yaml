---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # PVC provisioned separately (pvc.yaml); claim name = app name
    persistence:
      enabled: true
      create: false
      claimName: forgejo

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: LoadBalancer
        port: 22
        annotations:
          external-dns.alpha.kubernetes.io/hostname: git-ssh.${CLUSTER_DOMAIN}

    gitea:
      admin:
        existingSecret: forgejo-secret
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-secret
              key: INIT_POSTGRES_PASS
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      config:
        APP_NAME: Forgejo
        server:
          DOMAIN: git.${CLUSTER_DOMAIN}
          ROOT_URL: https://git.${CLUSTER_DOMAIN}
          SSH_DOMAIN: git-ssh.${CLUSTER_DOMAIN}
          SSH_PORT: 22
        database:
          DB_TYPE: postgres
          HOST: homelab-rw.databases.svc.cluster.local:5432
          NAME: forgejo
          USER: forgejo
        session:
          PROVIDER: db
        cache:
          ADAPTER: memory
        queue:
          TYPE: level
        service:
          DISABLE_REGISTRATION: true
        actions:
          ENABLED: true
        mirror:
          ENABLED: true

    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 1Gi
