---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-marja
spec:
  chartRef:
    kind: OCIRepository
    name: hermes-marja
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      hermes-marja:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
                cp /tmp/SOUL.md /opt/data/SOUL.md
                chown 10000:10000 /opt/data/config.yaml /opt/data/SOUL.md

        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.6.5
            args: ["gateway", "run"]
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: Europe/Amsterdam
            envFrom:
              - secretRef:
                  name: hermes-marja
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi
            ports:
              - containerPort: &port 8642
                name: http
                protocol: TCP

          dashboard:
            image: *image
            env:
              TZ: Europe/Amsterdam
              GATEWAY_HEALTH_URL: http://localhost:8642
            args:
              - dashboard
              - --host
              - "0.0.0.0"
              - --insecure
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 512Mi
            ports:
              - containerPort: &dashboardPort 9119
                name: http
                protocol: TCP

    service:
      app:
        controller: hermes-marja
        ports:
          http:
            port: *port
      dashboard:
        controller: hermes-marja
        ports:
          http:
            port: *dashboardPort

    route:
      app:
        hostnames:
          - marja.${CLUSTER_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http

    persistence:
      config:
        existingClaim: hermes-marja
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: hermes-marja
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
          - path: /tmp/SOUL.md
            subPath: SOUL.md

    serviceAccount:
      hermes-marja: {}

    rbac:
      roles:
        hermes-marja-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources:
                - pods
                - pods/log
                - nodes
                - services
                - namespaces
                - configmaps
                - persistentvolumes
                - persistentvolumeclaims
                - endpoints
                - resourcequotas
                - limitranges
                - serviceaccounts
                - events
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources:
                - deployments
                - daemonsets
                - statefulsets
                - replicasets
                - controllerrevisions
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources:
                - jobs
                - cronjobs
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources:
                - ingresses
                - ingressclasses
                - networkpolicies
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources:
                - storageclasses
                - csinodes
                - csidrivers
                - volumeattachments
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling"]
              resources:
                - horizontalpodautoscalers
              verbs: ["get", "list", "watch"]
            - apiGroups: ["policy"]
              resources:
                - poddisruptionbudgets
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources:
                - roles
                - rolebindings
                - clusterroles
                - clusterrolebindings
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiextensions.k8s.io"]
              resources:
                - customresourcedefinitions
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources:
                - nodes
                - pods
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources:
                - helmreleases
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources:
                - kustomizations
              verbs: ["get", "list", "watch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources:
                - gitrepositories
                - helmrepositories
                - ocirepositories
                - helmcharts
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources:
                - externalsecrets
                - secretstores
                - clustersecretstores
              verbs: ["get", "list", "watch"]
            - apiGroups: ["monitoring.coreos.com"]
              resources:
                - prometheuses
                - alertmanagers
                - servicemonitors
                - podmonitors
                - prometheusrules
              verbs: ["get", "list", "watch"]
            - apiGroups: ["snapshot.storage.k8s.io"]
              resources:
                - volumesnapshots
                - volumesnapshotcontents
                - volumesnapshotclasses
              verbs: ["get", "list", "watch"]
      bindings:
        hermes-marja-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-marja-read-all
          subjects:
            - identifier: hermes-marja
              serviceAccount: hermes-marja

    configMaps:
      config:
        data:
          config.yaml: |
            model:
              default: minimax
              provider: custom:kubernetes
              base_url: http://litellm.ai.svc.cluster.local:4000/v1
              api_key: $${LITELLM_API_KEY}
            fallback_providers:
              - provider: custom:kubernetes
                model: gpt-4.1-mini
            providers:
              kubernetes:
                base_url: http://litellm.ai.svc.cluster.local:4000/v1
                api_key: $${LITELLM_API_KEY}
            mcp_servers:
              garmin:
                url: http://mcp-garmin-connect-mcp-proxy.ai.svc.cluster.local:8080/mcp
            discord:
              bot_token: $${DISCORD_BOT_TOKEN}
              allowed_users: $${DISCORD_ALLOWED_USERS}
              require_mention: true
              auto_thread: true
              reactions: true
              thread_require_mention: true
            memory:
              auto_migrate: true
            compression:
              enabled: true
              threshold: 0.50
              target_ratio: 0.20
              protect_last_n: 20
            agent:
              max_turns: 90
              gateway_timeout: 1800
              reasoning_effort: medium
            security:
              redact_secrets: true
          SOUL.md: |
            Je bent Marja, de health & fitness assistent. Je helpt met het bijhouden
            van fitnessdata via Garmin Connect. Je kunt activiteiten, stappen,
            hartslag, slaap en andere gezondheidsmetrieken opvragen en analyseren.

            Focus: Garmin Connect data, fitnessactiviteiten, gezondheidstrends,
            trainingsanalyse, en welzijnsadvies.
