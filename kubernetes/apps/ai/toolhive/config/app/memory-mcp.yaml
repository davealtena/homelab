---
apiVersion: toolhive.stacklok.com/v1alpha1
kind: MCPServer
metadata:
  name: memory-mcp
spec:
  image: ghcr.io/bjw-s-labs/mcp-memory:2026.1.26
  transport: stdio
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: memory-mcp
      mountPath: /data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-mcp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ceph-block
