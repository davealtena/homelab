---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: litellm
  interval: 30m
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 17.4
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: litellm

        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable
            env:
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm
                    key: LITELLM_MASTER_KEY
              ANTHROPIC_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm
                    key: ANTHROPIC_API_KEY
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm
                    key: DATABASE_URL
            args:
              - --config
              - /etc/litellm/config.yaml
              - --port
              - "4000"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

      redis:
        containers:
          redis:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.1.0
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi

    service:
      app:
        forceRename: litellm
        primary: true
        controller: litellm
        ports:
          http:
            port: &port 4000
      redis:
        controller: redis
        ports:
          http:
            port: 6379

    persistence:
      config:
        type: configMap
        name: litellm-config
        advancedMounts:
          litellm:
            app:
              - path: /etc/litellm
                readOnly: true
      data:
        existingClaim: litellm
        advancedMounts:
          litellm:
            app:
              - path: /data

    route:
      app:
        hostnames:
          - litellm.${CLUSTER_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    configMaps:
      config:
        data:
          config.yaml: |
            model_list:
              - model_name: haiku
                litellm_params:
                  model: anthropic/claude-3-5-haiku-latest
                  api_key: os.environ/ANTHROPIC_API_KEY
              - model_name: sonnet
                litellm_params:
                  model: anthropic/claude-sonnet-4-20250514
                  api_key: os.environ/ANTHROPIC_API_KEY

            litellm_settings:
              drop_params: true
              cache: true
              cache_params:
                type: redis
                host: litellm-redis.ai.svc.cluster.local
                port: 6379
              num_retries: 2

            general_settings:
              master_key: os.environ/LITELLM_MASTER_KEY
              database_url: os.environ/DATABASE_URL
