---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multus
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: multus

  values:
    controllers:
      multus:
        type: daemonset

        pod:
          hostNetwork: true
          priorityClassName: system-node-critical
          # app-template v5 defaults this to false; multus needs the SA token
          # mounted at /var/run/secrets/kubernetes.io/serviceaccount/ to write
          # its kubeconfig. Without it the container exits 0 in a restart loop.
          automountServiceAccountToken: true
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists

        initContainers:
          cni-plugins:
            image:
              repository: ghcr.io/home-operations/cni-plugins
              tag: 1.9.1
          vlan-setup:
            image:
              repository: ghcr.io/home-operations/cni-plugins
              tag: 1.9.1
            command: ["/bin/sh", "-c"]
            args:
              - |
                ip link show enp1s0.20 >/dev/null 2>&1 || \
                  ip link add link enp1s0 name enp1s0.20 type vlan id 20
                ip link set enp1s0.20 up
            securityContext:
              privileged: true

        containers:
          multus:
            image:
              repository: ghcr.io/k8snetworkplumbingwg/multus-cni
              tag: v4.3.0
            args:
              - --cleanup-config-on-exit
              - --multus-cni-conf-dir=/tmp
            resources:
              requests:
                cpu: "10m"
              limits:
                memory: "512Mi"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - NET_ADMIN
                drop:
                  - ALL

    persistence:
      etc-cni-net-d:
        type: hostPath
        hostPath: /etc/cni/net.d
        globalMounts:
          - path: /host/etc/cni/net.d
      opt-cni-bin:
        type: hostPath
        hostPath: /opt/cni/bin
        globalMounts:
          - path: /host/opt/cni/bin
      tmp:
        type: emptyDir

    rbac:
      roles:
        multus:
          type: ClusterRole
          rules:
            - apiGroups:
                - "k8s.cni.cncf.io"
              resources:
                - "*"
              verbs:
                - "*"
            - apiGroups:
                - ""
              resources:
                - "pods"
                - "pods/status"
              verbs:
                - "get"
                - "update"
            - apiGroups:
                - ""
                - "events.k8s.io"
              resources:
                - "events"
              verbs:
                - "create"
                - "patch"
                - "update"
      bindings:
        multus:
          type: ClusterRoleBinding
          roleRef:
            identifier: multus
          subjects:
            - identifier: multus

    serviceAccount:
      multus: {}
