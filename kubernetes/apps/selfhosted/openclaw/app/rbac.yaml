---
# ServiceAccount wordt door de bjw-s app-template chart gegenereerd via
# values.serviceAccount.openclaw — zie helmrelease.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-selfhosted-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      - events
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - ocirepositories
      - helmrepositories
      - helmcharts
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-selfhosted-reader
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: selfhosted
roleRef:
  kind: Role
  name: openclaw-selfhosted-reader
  apiGroup: rbac.authorization.k8s.io
