---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "bind": "0.0.0.0",
        "auth": {
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        },
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.altena.io"
          ]
        }
      },
      "channels": {
        "discord": {
          "enabled": true,
          "defaultAccount": "inframan",
          "accounts": {
            "inframan": {
              "enabled": true,
              "name": "Inframan",
              "token": "${DISCORD_INFRAMAN_TOKEN}"
            },
            "marja": {
              "enabled": true,
              "name": "Marja",
              "token": "${DISCORD_MARJA_TOKEN}"
            }
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "moonshot/kimi-k2-0905"
          }
        },
        "list": [
          {
            "id": "main",
            "default": true
          },
          {
            "id": "valhalla",
            "skills": [
              "valhalla",
              "discord"
            ]
          },
          {
            "id": "sport",
            "skills": [
              "sport",
              "discord",
              "weather"
            ]
          }
        ]
      },
      "bindings": [
        {
          "type": "route",
          "agentId": "valhalla",
          "match": {
            "channel": "discord",
            "accountId": "inframan"
          },
          "comment": "All traffic naar de inframan bot gaat naar de valhalla agent"
        },
        {
          "type": "route",
          "agentId": "sport",
          "match": {
            "channel": "discord",
            "accountId": "marja"
          },
          "comment": "All traffic naar de marja bot gaat naar de sport agent"
        }
      ]
    }
