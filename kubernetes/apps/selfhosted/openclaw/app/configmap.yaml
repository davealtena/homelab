---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "diagnostics": {
        "enabled": true,
        "flags": ["discord.*"]
      },
      "logging": {
        "level": "debug",
        "consoleLevel": "debug"
      },
      "secrets": {
        "providers": {
          "default": {
            "source": "env",
            "allowlist": [
              "OPENCLAW_GATEWAY_TOKEN",
              "DISCORD_INFRAMAN_TOKEN",
              "DISCORD_MARJA_TOKEN",
              "MOONSHOT_API_KEY"
            ]
          }
        }
      },
      "gateway": {
        "port": 18789,
        "bind": "lan",
        "auth": {
          "token": {
            "source": "env",
            "provider": "default",
            "id": "OPENCLAW_GATEWAY_TOKEN"
          }
        },
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.altena.io"
          ]
        }
      },
      "channels": {
        "discord": {
          "enabled": true,
          "intents": {
            "presence": false,
            "guildMembers": false
          },
          "dmPolicy": "open",
          "groupPolicy": "open",
          "defaultAccount": "inframan",
          "accounts": {
            "inframan": {
              "enabled": true,
              "name": "Inframan",
              "token": {
                "source": "env",
                "provider": "default",
                "id": "DISCORD_INFRAMAN_TOKEN"
              }
            },
            "marja": {
              "enabled": true,
              "name": "Marja",
              "token": {
                "source": "env",
                "provider": "default",
                "id": "DISCORD_MARJA_TOKEN"
              }
            }
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "moonshot": {
            "baseUrl": "https://api.moonshot.ai/v1",
            "api": "openai-completions",
            "apiKey": {
              "source": "env",
              "provider": "default",
              "id": "MOONSHOT_API_KEY"
            },
            "models": [
              {
                "id": "kimi-k2.5",
                "name": "Kimi K2.5",
                "reasoning": false,
                "input": ["text"],
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 262144,
                "maxTokens": 262144
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "moonshot/kimi-k2.5"
          }
        },
        "list": [
          {
            "id": "main",
            "default": true
          },
          {
            "id": "valhalla",
            "workspace": "/home/node/.openclaw/workspace-valhalla",
            "skills": [
              "valhalla",
              "discord"
            ]
          },
          {
            "id": "sport",
            "workspace": "/home/node/.openclaw/workspace-sport",
            "skills": [
              "sport",
              "discord",
              "weather"
            ]
          }
        ]
      },
      "bindings": [
        {
          "type": "route",
          "agentId": "valhalla",
          "match": {
            "channel": "discord",
            "accountId": "inframan"
          },
          "comment": "All traffic naar de inframan bot gaat naar de valhalla agent"
        },
        {
          "type": "route",
          "agentId": "sport",
          "match": {
            "channel": "discord",
            "accountId": "marja"
          },
          "comment": "All traffic naar de marja bot gaat naar de sport agent"
        }
      ]
    }
