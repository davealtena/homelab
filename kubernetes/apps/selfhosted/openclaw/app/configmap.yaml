---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "bind": "0.0.0.0",
        "auth": {
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        },
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.altena.io"
          ]
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "moonshot/kimi-k2-0905"
          }
        },
        "list": [
          { "id": "main", "default": true }
        ]
      }
    }
