---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    # NOT "forgejo" — the chart itself owns a Secret with that name
    # (env-to-ini config incl. config_environment.sh)
    name: forgejo-secret
    creationPolicy: Owner
    template:
      data:
        # Admin user (chart gitea.admin.existingSecret)
        username: "{{ .forgejo_username }}"
        password: "{{ .forgejo_password }}"
        email: dave@altena.io
        # Postgres Init
        INIT_POSTGRES_DBNAME: forgejo
        INIT_POSTGRES_HOST: homelab-rw.databases.svc.cluster.local
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        INIT_POSTGRES_PASS: "{{ .forgejo_db_password }}"
        INIT_POSTGRES_USER: forgejo
  dataFrom:
    - extract:
        key: forgejo
      rewrite:
        - regexp:
            source: "(.*)"
            target: "forgejo_$1"
    - extract:
        key: cloudnative-pg
