---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 30m
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    server:
      fullnameOverride: victoria-logs
      retentionPeriod: 30d
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1500Mi
      serviceMonitor:
        enabled: true
