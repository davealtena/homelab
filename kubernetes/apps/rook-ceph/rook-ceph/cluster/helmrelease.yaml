---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 30m
  timeout: 15m
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: PrometheusRule
              name: prometheus-ceph-rules
            patch: |-
              - op: replace
                path: /spec/groups/6/rules/4/expr
                value: '(predict_linear(node_filesystem_free_bytes{device=~"/.*"}[2d], 3600 * 24 * 5) *on(instance) group_left(nodename) node_uname_info < 0) and on(device, instance, mountpoint) (node_filesystem_avail_bytes{device=~"/.*"} / node_filesystem_size_bytes{device=~"/.*"} < 0.25)'
          # CephPoolGrowthWarning: a mgr pod restart (upgrade/failover) leaves the old
          # pod's ceph_pool_percent_used series in the [2d] window, so the join hits
          # "duplicate time series on the left side of group_right" and the rule errors
          # for ~2 days (cascading into AlertingRulesError/RequestErrorsToAPI/TooManyLogs).
          # `max by(...)` collapses the duplicate series. test op guards the index.
          - target:
              kind: PrometheusRule
              name: prometheus-ceph-rules
            patch: |-
              - op: test
                path: /spec/groups/7/rules/0/alert
                value: CephPoolGrowthWarning
              - op: replace
                path: /spec/groups/7/rules/0/expr
                value: '(max by (cluster,pool_id,instance) (predict_linear(ceph_pool_percent_used[2d], 3600 * 24 * 5)) * on(cluster,pool_id,instance) group_right() ceph_pool_metadata) >= 95'
  values:
    monitoring:
      enabled: true
      createPrometheusRules: true
    toolbox:
      enabled: true
    cephClusterSpec:
      cephConfig:
        global:
          # discard disabled: inline TRIM to the (DRAM-less consumer) SSDs caused
          # rotating BLUESTORE_SLOW_OP warnings + occasional RBD stalls.
          bdev_enable_discard: "false"
          osd_class_update_on_start: "false"
          mon_clock_drift_allowed: "0.1"
          # BLUESTORE_SLOW_OP_ALERT defaults are very aggressive (threshold=1 op,
          # lifetime=24h), so a single transient slow op on the DRAM-less BX500s
          # parks the cluster in HEALTH_WARN for a day → constant alert flapping
          # with zero client impact (no blocked requests, PGs clean). Widen to
          # warn only on *sustained* slowness and clear quickly. The real fix is
          # enterprise PLP SSDs; blocked-IO/OSD-down have their own checks.
          bluestore_slow_ops_warn_threshold: "10"
          bluestore_slow_ops_warn_lifetime: "1800"
      crashCollector:
        disable: false
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
      network:
        provider: host
        addressRanges:
          public:
            - 192.168.1.0/24
          cluster:
            - 192.168.1.0/24
        connections:
          requireMsgr2: true
      resources:
        mgr:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        mon:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            memory: 1Gi
        osd:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 4Gi
      storage:
        useAllNodes: true
        useAllDevices: false
        # Target the 1TB Crucial SSDs on all nodes by WWN pattern
        devicePathFilter: ^/dev/disk/by-id/wwn-0x500a0751e9.*
        config:
          osdsPerDevice: "1"
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          # no fs-level `discard` mount option: avoids inline TRIM per delete to
          # the consumer SSDs (slow-op stalls). Rely on Ceph reclaim instead.
          parameters:
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: false
      deletionPolicy: Delete
    cephFileSystems:
      - name: &cephFileSystemName ceph-filesystem
        spec:
          metadataPool:
            replicated:
              size: 3
          dataPools:
            - failureDomain: host
              replicated:
                size: 3
              name: data0
          metadataServer:
            activeCount: 1
            activeStandby: true
            priorityClassName: system-cluster-critical
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: *cephFileSystemName
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
        storageClass:
          enabled: true
          isDefault: false
          name: ceph-filesystem
          pool: data0
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      isDefault: false
      deletionPolicy: Delete
    cephObjectStores: []
