---
# Cilium values for phobos (k3s single-node).
# Adapted from the homelab (Talos) config: kube-proxy replacement + native
# routing + endpointRoutes, but with k3s-appropriate API endpoint (6443) and
# without the Talos-specific cgroup/bpf/KubePrism overrides.
#
# NOTE: L2 announcements + LoadBalancer IP pools are intentionally NOT enabled
# here yet — the existing Talos cluster announces 192.168.1.128/27 on this LAN,
# and duplicating it would cause ARP conflicts. Add a non-overlapping pool when
# migrating. Hubble + Gateway API follow the bootstrap task requirements (the
# homelab uses Envoy Gateway instead).

cluster:
  name: society
  id: 1

# kube-proxy is disabled in k3s (--disable-kube-proxy); Cilium replaces it.
kubeProxyReplacement: true
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443

# Single-node native routing over the k3s pod CIDR (no encapsulation needed).
routingMode: native
ipv4NativeRoutingCIDR: "10.42.0.0/16"
endpointRoutes:
  enabled: true
ipam:
  mode: kubernetes

# k3s manages its own CNI conflist directory; don't take exclusive ownership.
cni:
  exclusive: false

operator:
  replicas: 1
  rollOutPods: true
rollOutCiliumPods: true

l7Proxy: true
loadBalancer:
  algorithm: maglev

# Observability (task requirement).
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Gateway API (task requirement). CRDs are installed out-of-band before Cilium.
# NOTE: Gateways will stay <pending> for an external IP until a (non-conflicting)
# LoadBalancer IP pool is added — deferred to avoid clashing with the existing
# Talos cluster's 192.168.1.128/27 L2 announcements.
gatewayAPI:
  enabled: true
