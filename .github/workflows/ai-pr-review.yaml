---
name: AI PR Review
on:
  pull_request:
    branches: ["main"]
    types: ["opened", "reopened", "synchronize", "ready_for_review", "labeled"]
permissions:
  contents: read
  pull-requests: write
jobs:
  review:
    # Review human PRs, plus the gated Renovate PRs (majors + cluster-critical infra,
    # labeled review/required by Renovate). Trivial bumps auto-merge silently and are
    # skipped — without tool access the reviewer can't read changelogs, so reviewing
    # routine version bumps is just noise.
    if: >-
      ${{ !endsWith(github.event.pull_request.user.login, '[bot]')
          || contains(github.event.pull_request.labels.*.name, 'review/required') }}
    runs-on: homelab-runner
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: AI review
        uses: davealtena/pr-reviewer@c82df116586ce0ccb781a1b1ea3c8e63f28f3a7f # v1.3.0
        with:
          ai_base_url: http://litellm.ai.svc.cluster.local:4000/v1
          ai_model: gpt-4.1-mini
          ai_api_key: ${{ secrets.LITELLM_API_KEY }}
          standards_file: AGENTS.md
          # Gated PRs (majors / critical-infra, labeled review/required) need my
          # manual merge — @mention me and always post a comment (even when clean)
          # so I'm notified under "@mentions only". My own PRs: stay silent unless findings.
          mention: ${{ contains(github.event.pull_request.labels.*.name, 'review/required') && 'davealtena' || '' }}
          always_comment: ${{ contains(github.event.pull_request.labels.*.name, 'review/required') }}
